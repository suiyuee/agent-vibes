name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Build SEA binaries on each platform ────────────────────────────
  build-sea:
    strategy:
      matrix:
        include:
          - os: macos-14 # Apple Silicon (M1+)
            platform: darwin
            arch: arm64
          - os: macos-15-intel # Intel Mac (x64)
            platform: darwin
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "npm ci attempt ${attempt}/3"
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after ${attempt} attempts"
              exit 1
            fi

            echo "npm ci failed, cleaning workspace before retry"
            rm -rf node_modules
            npm cache clean --force || true
            sleep $((attempt * 5))
          done

      - name: Build SEA binary (Unix)
        if: runner.os != 'Windows'
        working-directory: apps/protocol-bridge
        run: bash sea/build.sh --clean

      - name: Build SEA binary (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/protocol-bridge
        shell: pwsh
        run: |
          # Windows SEA build (PowerShell equivalent of build-sea.sh)
          node sea/esbuild.js

          # Sync migration assets
          $srcMigrations = "src\persistence\migrations"
          $dstMigrations = "dist\persistence\migrations"
          New-Item -ItemType Directory -Force -Path $dstMigrations | Out-Null
          Copy-Item "$srcMigrations\*.sql" $dstMigrations -Force
          $migrationCount = (Get-ChildItem "$dstMigrations\*.sql").Count
          Write-Host "Synced $migrationCount migration(s)"

          # Generate SEA config from dist migrations
          node sea/generate-config.mjs
          node --experimental-sea-config dist/sea-config.generated.json

          $nodeBin = (Get-Command node).Source
          $binaryName = "agent-vibes-bridge-win32-x64.exe"
          Copy-Item $nodeBin "dist\$binaryName"

          npx -y postject "dist\$binaryName" NODE_SEA_BLOB dist\sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

          $size = (Get-Item "dist\$binaryName").Length / 1MB
          Write-Host "✅ SEA binary ready: dist\$binaryName ($([math]::Round($size))MB)"

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        working-directory: apps/protocol-bridge
        run: |
          BINARY=$(ls dist/agent-vibes-bridge-* | head -1)
          chmod +x "$BINARY"
          # Start server, wait 5s, check health, then kill
          PORT=19999 USE_HTTP2=false "$BINARY" &
          PID=$!
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:19999/health || echo "000")
          kill $PID 2>/dev/null || true
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Smoke test passed"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        working-directory: apps/protocol-bridge
        shell: pwsh
        run: |
          $binary = "dist\agent-vibes-bridge-win32-x64.exe"
          $env:PORT = "19999"
          $env:USE_HTTP2 = "false"
          $proc = Start-Process -FilePath $binary -PassThru -NoNewWindow
          Start-Sleep -Seconds 5
          try {
            $response = Invoke-WebRequest -Uri "http://127.0.0.1:19999/health" -UseBasicParsing -TimeoutSec 5
            if ($response.StatusCode -eq 200) {
              Write-Host "✅ Smoke test passed"
            } else {
              Write-Host "❌ Health check failed (HTTP $($response.StatusCode))"
              exit 1
            }
          } catch {
            Write-Host "❌ Health check failed: $_"
            exit 1
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.platform }}-${{ matrix.arch }}
          path: apps/protocol-bridge/dist/agent-vibes-bridge-*
          retention-days: 7

  # ── Build platform-specific VS Code extensions ──────────────────────
  build-extension:
    needs: build-sea
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/protocol-bridge/src/llm/google/go-worker/go.mod

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "npm ci attempt ${attempt}/3"
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after ${attempt} attempts"
              exit 1
            fi

            echo "npm ci failed, cleaning workspace before retry"
            rm -rf node_modules
            npm cache clean --force || true
            sleep $((attempt * 5))
          done

      - name: Download all bridge artifacts
        uses: actions/download-artifact@v4
        with:
          path: bridge-binaries
          merge-multiple: true

      - name: Place bridge binaries for each platform
        working-directory: apps/vscode-extension
        run: |
          declare -A PLATFORM_MAP=(
            ["darwin-arm64"]=""
            ["darwin-x64"]=""
            ["linux-x64"]=""
            ["win32-x64"]=".exe"
          )

          for target in "${!PLATFORM_MAP[@]}"; do
            ext="${PLATFORM_MAP[$target]}"
            dir="bridge/${target}"
            mkdir -p "$dir"

            # Find the matching binary from downloaded artifacts
            src=$(find ../../bridge-binaries -name "agent-vibes-bridge-${target}*" -type f | head -1)
            if [[ -z "$src" ]]; then
              echo "❌ No bridge binary found for ${target}"
              exit 1
            fi

            cp "$src" "${dir}/agent-vibes-bridge${ext}"
            [[ -z "$ext" ]] && chmod +x "${dir}/agent-vibes-bridge"

            echo "✅ ${target}: $(du -sh "${dir}/agent-vibes-bridge${ext}" | cut -f1)"
          done

      - name: Build extension code
        run: |
          cd apps/vscode-extension && node esbuild.config.mjs --production

      - name: Sync assets
        working-directory: apps/vscode-extension
        run: |
          node scripts/sync-readme.mjs
          node scripts/sync-bridge-assets.mjs --all-platforms

      - name: Package platform-specific extensions
        working-directory: apps/vscode-extension
        run: |
          TARGETS=("darwin-arm64" "darwin-x64" "linux-x64" "win32-x64")
          STAGING_DIR=$(mktemp -d)
          trap 'rm -rf "$STAGING_DIR"' EXIT
          mkdir -p "$STAGING_DIR/bridge"
          cp -a bridge/. "$STAGING_DIR/bridge/"

          for target in "${TARGETS[@]}"; do
            echo "📦 Packaging for ${target}..."

            rm -rf bridge
            mkdir -p bridge
            cp -a "$STAGING_DIR/bridge/." bridge/

            # Keep only the target platform's bridge directory
            for other in "${TARGETS[@]}"; do
              if [[ "$other" != "$target" ]]; then
                rm -rf "bridge/${other}"
              fi
            done

            npx @vscode/vsce package --no-dependencies --target "$target"
          done
          echo ""
          ls -lh *.vsix

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsix-all-platforms
          path: apps/vscode-extension/*.vsix
          retention-days: 7

  # ── Create GitHub Release with all binaries ────────────────────────
  release:
    needs: [build-sea, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read extension release metadata
        id: version
        run: |
          VERSION=$(node -p "require('./apps/vscode-extension/package.json').version")
          CURSOR_VERSION=$(node -p "require('./apps/vscode-extension/package.json').agentVibes?.cursorVersion || ''")
          if [ -z "$CURSOR_VERSION" ]; then
            echo "Cursor compatibility version missing in apps/vscode-extension/package.json"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "cursor_version=$CURSOR_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download extension packages
        uses: actions/download-artifact@v4
        with:
          name: vsix-all-platforms
          path: extensions

      - name: List release assets
        run: |
          echo "── Cursor extensions ──"
          ls -lh extensions/

      - name: Create GitHub Release (draft)
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Agent Vibes v${{ steps.version.outputs.version }} (Cursor ${{ steps.version.outputs.cursor_version }})
          files: |
            extensions/*.vsix
          generate_release_notes: true
          body: |
            ## Agent Vibes

            Compatible Cursor version: `${{ steps.version.outputs.cursor_version }}`

            ### Cursor Extension (.vsix)

            One-click download + install:

            #### macOS Apple Silicon

            ```bash
            # Download
            curl -L -o agent-vibes-darwin-arm64-${{ steps.version.outputs.version }}.vsix https://github.com/funny-vibes/agent-vibes/releases/download/${{ github.ref_name }}/agent-vibes-darwin-arm64-${{ steps.version.outputs.version }}.vsix

            # Install
            cursor --install-extension agent-vibes-darwin-arm64-${{ steps.version.outputs.version }}.vsix --force
            ```

            #### macOS Intel

            ```bash
            # Download
            curl -L -o agent-vibes-darwin-x64-${{ steps.version.outputs.version }}.vsix https://github.com/funny-vibes/agent-vibes/releases/download/${{ github.ref_name }}/agent-vibes-darwin-x64-${{ steps.version.outputs.version }}.vsix

            # Install
            cursor --install-extension agent-vibes-darwin-x64-${{ steps.version.outputs.version }}.vsix --force
            ```

            #### Linux x64

            ```bash
            # Download
            curl -L -o agent-vibes-linux-x64-${{ steps.version.outputs.version }}.vsix https://github.com/funny-vibes/agent-vibes/releases/download/${{ github.ref_name }}/agent-vibes-linux-x64-${{ steps.version.outputs.version }}.vsix

            # Install
            cursor --install-extension agent-vibes-linux-x64-${{ steps.version.outputs.version }}.vsix --force
            ```

            #### Windows x64

            ```powershell
            # Download
            Invoke-WebRequest -Uri "https://github.com/funny-vibes/agent-vibes/releases/download/${{ github.ref_name }}/agent-vibes-win32-x64-${{ steps.version.outputs.version }}.vsix" -OutFile "agent-vibes-win32-x64-${{ steps.version.outputs.version }}.vsix"

            # Install
            cursor --install-extension agent-vibes-win32-x64-${{ steps.version.outputs.version }}.vsix --force
            ```

      - name: Publish release (remove draft flag)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
