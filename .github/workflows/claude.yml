name: Claude Autonomous Pipeline

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [labeled]
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: claude-code
  cancel-in-progress: false

jobs:
  # Job 1: Process Issue - Normalize and implement in one step
  process-issue:
    if: |
      github.event_name == 'issues' &&
      github.event.label.name == 'claude' &&
      contains(
        fromJSON(vars.CLAUDE_ALLOWED_ACTORS_JSON != '' && vars.CLAUDE_ALLOWED_ACTORS_JSON || format('["{0}"]', github.repository_owner)),
        github.actor
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process and Implement Issue
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-5-thinking
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}

            IMPORTANT: Respond in the SAME language as the Issue content.

            You are an autonomous developer. Complete this Issue.

            ## Steps

            1. Read the Issue: `gh issue view ${{ github.event.issue.number }}`

            2. **Assess Complexity**:
               - SIMPLE (single file, clear requirement): proceed to step 4
               - COMPLEX (multiple files, ambiguous scope): proceed to step 3

            3. **Global Codebase Analysis** (for COMPLEX issues only):
               - Search for similar patterns across the entire codebase
               - Understand how similar problems are solved elsewhere
               - Identify ALL related files that may need changes
               - Ensure the solution follows existing conventions
               - REJECT temporary/local fixes - design a systematic solution

            4. Implement the solution following existing patterns

            5. Create a PR targeting 'dev' branch using `gh pr create`:
               - First create and push branch: issue-${{ github.event.issue.number }}-{english-slug}
               - Command: `gh pr create --base dev --title "Closes #${{ github.event.issue.number }}: [description]" --body "Closes #${{ github.event.issue.number }}"`

            6. Verify PR was created successfully

          claude_args: '--allowedTools "Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(npx:*),Read,Write,Edit,MultiEdit,Glob,Grep,LS,Task,WebFetch,WebSearch,TodoRead,TodoWrite,NotebookEditCell"'
          settings: '{"model": "claude-sonnet-4-5-thinking"}'

  # Job 2: Review - Validate implementation against acceptance criteria
  review:
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'synchronize') &&
      contains(
        fromJSON(vars.CLAUDE_ALLOWED_ACTORS_JSON != '' && vars.CLAUDE_ALLOWED_ACTORS_JSON || format('["{0}"]', github.repository_owner)),
        github.actor
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-5-thinking
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            IMPORTANT: Respond in the SAME language as the linked Issue.

            You are a professional code reviewer. Review this PR thoroughly.

            ## Context Analysis

            1. Get linked Issue: look for "Closes #N" in PR title/body
            2. Read the Issue: `gh issue view {N}`
            3. Explore the codebase to understand:
               - Project structure and conventions
               - Related modules and dependencies
               - Existing code patterns

            ## Research (if needed)

            4. Use WebFetch to check official documentation when:
               - Unfamiliar APIs or libraries are used
               - Need to verify best practices

            ## Code Review

            5. Review PR diff: `gh pr diff`

            6. **Mandatory Cleanup Check** - Flag and request removal of:
               - Error code (compilation/runtime errors)
               - Redundant code (duplicates, dead code, unused imports)
               - Temporary solutions (TODO, FIXME, workarounds)
               - Compatibility logic (outdated adapters, fallbacks)
               - Speculative code (unverified assumptions)
               - Hardcoded values (colors, configs, magic numbers)
               - Debug code, emoji, low-value comments

            7. **Complexity Judgment**:
               - Essential complexity (based on theory/UX) → KEEP
               - Accidental complexity (ad-hoc fixes, "add if" patches) → REQUEST REFACTOR

            8. Quality verification:
               - Does the code solve the Issue's request?
               - Follows project conventions?
               - Potential bugs or edge cases?
               - Security implications?

            ## Verdict

            9. Post structured review comment:
               - Issues found (if any)
               - Verdict: PASSED / NEEDS_WORK

            10. If PASSED with no issues: merge using `gh pr merge --squash --delete-branch`

          claude_args: '--allowedTools "Bash(*),Read,Glob,Grep,WebFetch,WebSearch,mcp__github_inline_comment__create_inline_comment"'
          settings: '{"model": "claude-sonnet-4-5-thinking"}'

  # Interactive mode - Handle @claude mentions in comments
  interactive:
    if: |
      (
        (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '@claude') || contains(github.event.comment.body, '@c '))) ||
        (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, '@claude') || contains(github.event.comment.body, '@c ')))
      ) &&
      contains(
        fromJSON(vars.CLAUDE_ALLOWED_ACTORS_JSON != '' && vars.CLAUDE_ALLOWED_ACTORS_JSON || format('["{0}"]', github.repository_owner)),
        github.actor
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Handle Interactive Request
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-5-thinking
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@c"
          claude_args: '--allowedTools "Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(npx:*),Read,Write,Edit,MultiEdit,Glob,Grep,LS,Task,WebFetch,WebSearch,TodoRead,TodoWrite,NotebookEditCell"'
          settings: '{"model": "claude-sonnet-4-5-thinking"}'
